apiVersion: apps/v1
kind: Deployment
metadata:
  name: brx-api
  labels:
    app: brx-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: brx-api
  template:
    metadata:
      labels:
        app: brx-api
    spec:
      containers:
      - name: api
        image: brx-system/api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: brx-config
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: brx-api-service
spec:
  selector:
    app: brx-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
